        .custom-square {
            width: var(--square-size, 750px);

        }

        .nav-links a:hover {
            color: #f292ff;
            background-color: #bc74ff;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.3s, color 0.3s;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
